version: '3.8'

services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env

  prod-local:
    build:
      context: .
      target: prod
    ports:
      - "3001:3000"
    env_file:
      - .env
