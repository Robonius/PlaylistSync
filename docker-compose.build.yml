version: '3.8'

services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  prod-local:
    build:
      context: .
      target: prod
    ports:
      - "8081:80"
